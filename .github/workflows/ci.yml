name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python ──────────────────────────────────────────────────────────
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PYTHON
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v

  # ── JavaScript / TypeScript ─────────────────────────────────────────
  test-js:
    name: Test JavaScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: JS
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: JS/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  # ── Rust ────────────────────────────────────────────────────────────
  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RUST
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            RUST/target/
          key: cargo-${{ runner.os }}-${{ hashFiles('RUST/Cargo.lock', 'RUST/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

  # ── Go ──────────────────────────────────────────────────────────────
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GO
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: GO/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test -v ./contexa/

  # ── Zig ─────────────────────────────────────────────────────────────
  test-zig:
    name: Test Zig
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ZIG
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.14.0"

      - name: Build
        run: zig build

      - name: Run tests
        run: zig build test

  # ── Lua ──────────────────────────────────────────────────────────
  test-lua:
    name: Test Lua
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LUA
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua and LuaFileSystem
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.4 liblua5.4-dev luarocks
          sudo luarocks install luafilesystem

      - name: Run tests
        run: lua test.lua

  # ── Elixir ───────────────────────────────────────────────────────
  test-elixir:
    name: Test Elixir
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ELIXIR
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test --trace
