name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  # ── Run all tests first ─────────────────────────────────────────────
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PYTHON
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run pytest -v

  test-js:
    name: Test JavaScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: JS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: JS/package-lock.json
      - run: npm ci || npm install
      - run: npm run build
      - run: npm test

  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RUST
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            RUST/target/
          key: cargo-${{ runner.os }}-${{ hashFiles('RUST/Cargo.lock', 'RUST/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-
      - run: cargo build --verbose
      - run: cargo test --verbose

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: GO/go.sum
      - run: go mod download
      - run: go build ./...
      - run: go test -v ./cortexa/

  test-zig:
    name: Test Zig
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ZIG
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.14.0"
      - run: zig build
      - run: zig build test

  test-lua:
    name: Test Lua
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LUA
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua and LuaFileSystem
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.4 liblua5.4-dev luarocks
          sudo luarocks install luafilesystem
      - run: lua test.lua

  test-elixir:
    name: Test Elixir
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ELIXIR
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"
      - run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test --trace

  # ── Publish Python to PyPI ──────────────────────────────────────────
  publish-python:
    name: Publish Python to PyPI
    needs: [test-python, test-js, test-rust, test-go, test-zig, test-lua, test-elixir]
    runs-on: ubuntu-latest
    environment: pypi
    defaults:
      run:
        working-directory: PYTHON
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish

  # ── Publish JavaScript to npm ───────────────────────────────────────
  publish-js:
    name: Publish JavaScript to npm
    needs: [test-python, test-js, test-rust, test-go, test-zig, test-lua, test-elixir]
    runs-on: ubuntu-latest
    environment: npm
    defaults:
      run:
        working-directory: JS
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: JS/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Publish Rust to crates.io ───────────────────────────────────────
  publish-rust:
    name: Publish Rust to crates.io
    needs: [test-python, test-js, test-rust, test-go, test-zig, test-lua, test-elixir]
    runs-on: ubuntu-latest
    environment: crates
    defaults:
      run:
        working-directory: RUST
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Publish Lua to LuaRocks ─────────────────────────────────────────
  publish-lua:
    name: Publish Lua to LuaRocks
    needs: [test-python, test-js, test-rust, test-go, test-zig, test-lua, test-elixir]
    runs-on: ubuntu-latest
    environment: luarocks
    defaults:
      run:
        working-directory: LUA
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua and LuaRocks
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.4 luarocks
          sudo luarocks install dkjson

      - name: Publish to LuaRocks
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        run: luarocks upload cortexa-0.1.1-1.rockspec --api-key="$LUAROCKS_API_KEY"

  # ── Publish Elixir to Hex.pm ────────────────────────────────────────
  publish-elixir:
    name: Publish Elixir to Hex.pm
    needs: [test-python, test-js, test-rust, test-go, test-zig, test-lua, test-elixir]
    runs-on: ubuntu-latest
    environment: hex
    defaults:
      run:
        working-directory: ELIXIR
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Publish to Hex.pm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

  # ── Create GitHub Release (for Go / Zig / all) ─────────────────────
  create-release:
    name: Create GitHub Release
    needs: [test-python, test-js, test-rust, test-go, test-zig, test-lua, test-elixir]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create Go subdirectory tag
        run: |
          TAG="${{ steps.version.outputs.version }}"
          GO_TAG="GO/$TAG"
          git tag "$GO_TAG" || true
          git push origin "$GO_TAG" || true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.version.outputs.version }}"
          {
            echo "notes<<EOF"
            echo "## cortexa $TAG"
            echo ""
            echo "Git-inspired context management for LLM agents — COMMIT, BRANCH, MERGE, and CONTEXT operations over a persistent versioned memory workspace."
            echo ""
            echo "### Install"
            echo ""
            echo "| Language | Command |"
            echo "|----------|---------|"
            echo "| Python   | \`pip install cortexa\` |"
            echo "| JS/TS    | \`npm install cortexa\` |"
            echo "| Rust     | \`cargo add cortexa-gcc\` |"
            echo "| Go       | \`go get github.com/swadhinbiswas/Cortexa/GO/cortexa@GO/$TAG\` |"
            echo "| Lua      | \`luarocks install cortexa\` |"
            echo "| Elixir   | \`{:cortexa, \"~> 0.1.1\"}\` in mix.exs |"
            echo "| Zig      | Add dependency via \`build.zig.zon\` (see README) |"
            echo ""
            echo "### Changes"
            echo ""
            git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "cortexa ${{ steps.version.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: false
